services:

  - type: web
    name: sourcesurf-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: true
      - key: REDIS_URL
        sync: true
      - key: SCRAPER_URL
        sync: true
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: true
      - key: GITHUB_CLIENT_ID
        sync: true
      - key: GITHUB_CLIENT_SECRET
        sync: true
  - type: redis
    name: sourcesurf-redis
    plan: free
