services:
  # Node Backend (Express API)
  - type: web
    name: sourcesurf-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false 
      - key: SCRAPER_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Redis Instance
  - type: redis
    name: sourcesurf-redis
    plan: free
    ipAllowList: [] # Blocks external public access (only allows internal Render services)
